<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin – The Dream Residency</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div id="root"></div>

<script>
const $ = (id) => document.getElementById(id);
const root = $('root');

async function api(url, opts = {}) {
  const res = await fetch(url, { credentials: 'same-origin', ...opts });
  if (res.status === 401) { renderLogin('Session expired. Please sign in again.'); throw new Error('unauth'); }
  return res.json();
}

function renderLogin(err = '') {
  root.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <h1>Admin Login</h1>
        <p>The Dream Residency</p>
        <form id="loginForm">
          <label><span>User ID</span><input id="u" required autocomplete="username" /></label>
          <label><span>Password</span><input id="p" type="password" required autocomplete="current-password" /></label>
          <button class="primary" type="submit">Sign In</button>
          <div class="error" id="err">${err}</div>
        </form>
      </div>
    </div>`;
  $('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const r = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: $('u').value, password: $('p').value })
    });
    if (r.ok) renderApp(); else $('err').textContent = 'Invalid credentials';
  });
}

let currentTab = 'dashboard';

function renderApp() {
  root.innerHTML = `
    <div class="admin-shell">
      <div class="admin-nav">
        <div class="brand">The Dream Residency – Admin</div>
        <div>
          <a href="/" style="color:#c9a96e;margin-right:14px;">View Site</a>
          <button class="ghost" id="logoutBtn">Logout</button>
        </div>
      </div>
      <div class="tabs">
        ${[['dashboard','Dashboard'],['requests','Booking Requests'],['walkin','Walk-In / Check-In'],['visitors','Visitors'],['content','Site Content'],['roomtypes','Room Types'],['rooms','Rooms'],['customers','Customers'],['bookings','Bookings'],['reports','Reports']].map(([t,label]) =>
          `<button data-t="${t}" class="${t===currentTab?'active':''}">${label}</button>`).join('')}
      </div>
      <div class="panel" id="panel"></div>
    </div>`;
  $('logoutBtn').onclick = async () => { await fetch('/api/logout', { method: 'POST' }); renderLogin(); };
  document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => { currentTab = b.dataset.t; renderApp(); });
  ({ dashboard, requests, walkin, visitors, content, roomtypes, rooms, customers, bookings, reports })[currentTab]();
}

// ---------- Booking Requests ----------
async function requests() {
  const reqs = await api('/api/booking-requests');
  const pending = reqs.filter(r => r.status === 'pending').length;
  $('panel').innerHTML = `
    <h2>Booking Requests ${pending ? `<span class="badge pending" style="font-size:13px;vertical-align:middle;">${pending} pending</span>`:''}</h2>
    <p class="muted" style="margin-top:-12px;margin-bottom:20px;">Requests submitted by customers from your website. Confirm or reject each one.</p>
    <table>
      <thead><tr><th>#</th><th>Submitted</th><th>Guest</th><th>Contact</th><th>Dates</th><th>Guests</th><th>Rooms</th><th>Room Type</th><th>Details</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${reqs.map(r => `
        <tr>
          <td>${r.id}</td>
          <td>${(r.created_at||'').slice(0,16).replace('T',' ')}</td>
          <td><strong>${esc(r.name)}</strong></td>
          <td>${esc(r.phone)}<br><small class="muted">${esc(r.email||'')}</small></td>
          <td>${r.check_in}<br>→ ${r.check_out}</td>
          <td>${r.guests}</td>
          <td>${r.rooms_required||1}</td>
          <td>${esc(r.room_type||'Any')}</td>
          <td style="max-width:240px;">
            ${(r.guests_list && r.guests_list.length) ? `<button class="ghost" data-vg="${r.id}" style="font-size:11px;padding:4px 8px;">👥 View ${r.guests_list.length} guest(s)</button>` : ''}
            ${r.message ? `<div style="font-size:12px;margin-top:4px;color:#555;">${esc(r.message)}</div>` : ''}
          </td>
          <td><span class="badge ${r.status}">${r.status}</span></td>
          <td>
            ${r.status==='pending' ? `<button class="ok" data-confirm="${r.id}">Confirm</button> <button class="danger" data-reject="${r.id}">Reject</button>` : ''}
            <button class="ghost" data-del="${r.id}" style="margin-top:4px;">Delete</button>
          </td>
        </tr>`).join('') || '<tr><td colspan="11" class="muted" style="text-align:center;padding:30px;">No booking requests yet</td></tr>'}
      </tbody>
    </table>`;
  document.querySelectorAll('[data-confirm]').forEach(b => b.onclick = async () => {
    const reqId = b.dataset.confirm;
    const r = reqs.find(x => x.id == reqId);
    openConfirmModal(r);
  });
  document.querySelectorAll('[data-reject]').forEach(b => b.onclick = async () => {
    if (!confirm('Reject this request? The customer will not be notified automatically.')) return;
    await fetch('/api/booking-requests/' + b.dataset.reject, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status: 'rejected' }) });
    requests();
  });
  document.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    if (!confirm('Delete this request?')) return;
    await fetch('/api/booking-requests/' + b.dataset.del, { method: 'DELETE' });
    requests();
  });
  document.querySelectorAll('[data-vg]').forEach(b => b.onclick = () => {
    const r = reqs.find(x => x.id == b.dataset.vg);
    showGuestsModal(r.guests_list, `Booking Request #${r.id} — ${r.name}`);
  });
}

function showGuestsModal(guests, title) {
  showModal(`
    <h3 style="margin:0 0 14px;">👥 ${esc(title)}</h3>
    <p class="muted" style="margin:0 0 16px;font-size:13px;">${guests.length} guest(s) on this booking.</p>
    <table style="font-size:13px;">
      <thead><tr><th>#</th><th>Name</th><th>Age</th><th>ID Type</th><th>ID Number</th></tr></thead>
      <tbody>
        ${guests.map((g, i) => `
          <tr>
            <td>${i===0 ? '★ Primary' : i+1}</td>
            <td><strong>${esc(g.name||'-')}</strong></td>
            <td>${esc(g.age||'-')}</td>
            <td>${esc(g.id_type||'-')}</td>
            <td>${esc(g.id_no||'-')}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  `);
}

// ---------- Confirm Request Modal ----------
async function openConfirmModal(reqRow) {
  const avail = await fetch(`/api/availability?check_in=${reqRow.check_in}&check_out=${reqRow.check_out}`).then(r => r.json());
  const matching = reqRow.room_type ? avail.filter(r => r.category === reqRow.room_type) : avail;
  const roomList = matching.length ? matching : avail;
  const guestsBlock = (reqRow.guests_list && reqRow.guests_list.length) ? `
    <div class="full" style="background:#faf7f0;border:1px solid #e8dec5;padding:12px 14px;border-radius:4px;font-size:13px;">
      <strong>Guest details (${reqRow.guests_list.length}):</strong>
      <ol style="margin:6px 0 0 18px;padding:0;">
        ${reqRow.guests_list.map(g => `<li>${esc(g.name||'-')}${g.age?` · age ${esc(g.age)}`:''}${g.id_no?` · ${esc(g.id_type||'ID')}: ${esc(g.id_no)}`:''}</li>`).join('')}
      </ol>
    </div>` : '';
  const nights = Math.max(1, Math.round((new Date(reqRow.check_out) - new Date(reqRow.check_in))/86400000));
  showModal(`
    <h3 style="margin:0 0 6px;">Confirm Booking Request</h3>
    <p class="muted" style="margin:0 0 18px;">Pick a room for <strong>${esc(reqRow.name)}</strong>. A confirmation email will be sent to ${esc(reqRow.email||'(no email)')}.</p>
    <div class="form-grid" style="margin:0;">
      <div class="full"><strong>Stay:</strong> ${reqRow.check_in} → ${reqRow.check_out} (${nights} night${nights>1?'s':''}) · ${reqRow.guests} guest(s) · ${reqRow.rooms_required||1} room(s) required · Preferred: ${esc(reqRow.room_type||'Any')}</div>
      ${guestsBlock}
      <label class="full"><span>Assign Room *</span>
        <select id="cf_room">
          ${roomList.length
            ? roomList.map(r => `<option value="${r.id}" data-price="${r.price}">${esc(r.number)} – ${esc(r.category)} (₹${r.price}/night)</option>`).join('')
            : '<option value="">No rooms available for these dates</option>'}
        </select>
      </label>
      <div class="full"><strong>Total (auto-calculated):</strong> <span id="cf_total_disp" style="font-size:18px;color:var(--gold-2);"></span> <small class="muted">= ${nights} night(s) × room price × ${reqRow.rooms_required||1} room(s)</small></div>
      <div class="full" style="display:flex;gap:10px;justify-content:flex-end;margin-top:10px;">
        <button class="ghost" onclick="closeModal()">Cancel</button>
        <button class="primary" id="cf_submit">Confirm & Send Email</button>
      </div>
      <div class="full" id="cf_msg"></div>
    </div>
  `);
  function recalc() {
    const opt = $('cf_room').selectedOptions[0];
    if (!opt || !opt.dataset.price) { $('cf_total_disp').textContent = '—'; return; }
    const total = nights * parseFloat(opt.dataset.price) * (reqRow.rooms_required||1);
    $('cf_total_disp').textContent = '₹' + total.toLocaleString('en-IN');
  }
  $('cf_room').onchange = recalc;
  recalc();
  $('cf_submit').onclick = async () => {
    const room_id = $('cf_room').value;
    if (!room_id) { $('cf_msg').innerHTML = '<div style="color:#dc2626;">Please select a room.</div>'; return; }
    $('cf_submit').disabled = true; $('cf_msg').innerHTML = 'Confirming…';
    const r = await fetch(`/api/booking-requests/${reqRow.id}/confirm`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ room_id }) });
    const j = await r.json();
    if (r.ok) {
      const note = j.email && j.email.sent
        ? '✓ Confirmed. Email sent to customer.'
        : `✓ Confirmed and booking created. (Email not sent: ${j.email && j.email.reason || 'configure SMTP in Site Content'})`;
      $('cf_msg').innerHTML = `<div style="background:#dcfce7;color:#166534;padding:10px;border-radius:4px;">${note}</div>`;
      setTimeout(() => { closeModal(); requests(); }, 1400);
    } else {
      $('cf_msg').innerHTML = `<div style="color:#dc2626;">${j.error || 'Failed'}</div>`;
      $('cf_submit').disabled = false;
    }
  };
}

// ---------- Walk-In / Returning Customer Check-In ----------
async function walkin() {
  const rms = await api('/api/rooms');
  $('panel').innerHTML = `
    <h2>Walk-In Check-In</h2>
    <p class="muted" style="margin-top:-12px;margin-bottom:18px;">Search by phone, email or name. Returning guests are auto-detected so you don't have to re-enter their details.</p>
    <div style="background:#f9fafb;border:1px solid #e5e7eb;padding:18px;border-radius:8px;margin-bottom:20px;">
      <label style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#6b7280;">Search guest by phone / email / name</label>
      <input id="wi_search" placeholder="Type to search..." style="width:100%;padding:12px;font-size:15px;margin-top:6px;border:1px solid #ddd;border-radius:6px;" />
      <div id="wi_results" style="margin-top:10px;"></div>
    </div>
    <div id="wi_form"></div>`;

  let timer;
  $('wi_search').oninput = () => {
    clearTimeout(timer);
    const q = $('wi_search').value.trim();
    if (!q) { $('wi_results').innerHTML = ''; return; }
    timer = setTimeout(async () => {
      const r = await api('/api/customers/lookup?q=' + encodeURIComponent(q));
      if (!r.matches.length) {
        $('wi_results').innerHTML = `<div style="padding:12px;background:#fff3cd;border:1px solid #ffc107;border-radius:6px;">No matching guest found. <button class="primary" onclick="walkInNewGuest('${q.replace(/'/g,"&#39;")}')">+ Register as New Guest</button></div>`;
        return;
      }
      $('wi_results').innerHTML = r.matches.map(c => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:white;border:1px solid #ddd;border-radius:6px;margin-bottom:6px;">
          <div>
            <strong>${esc(c.name)}</strong> · ${esc(c.contact||'-')} · ${esc(c.email||'-')}
            <br><small class="muted">Visits: <strong>${c.booking_count || 0}</strong> · Nights stayed: <strong>${c.total_nights || 0}</strong>${c.last_stay ? ' · Last stay ended: ' + c.last_stay : ''}</small>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="ghost" onclick='viewCustomerHistory(${c.id})'>📜 Full History</button>
            <button class="primary" onclick='walkInExistingGuest(${c.id})'>Check-In This Guest</button>
          </div>
        </div>`).join('');
    }, 200);
  };

  window.walkInNewGuest = async (prefill) => {
    showWalkInForm({ prefill });
  };
  window.walkInExistingGuest = async (id) => {
    const h = await api(`/api/customers/${id}/history`);
    showWalkInForm({ customer: h.customer, history: h });
  };
  window.viewCustomerHistory = async (id) => {
    const h = await api(`/api/customers/${id}/history`);
    const inr = n => '₹' + Number(n||0).toLocaleString('en-IN');
    showModal(`
      <h3 style="margin:0 0 6px;">📜 ${esc(h.customer.name)} — Full History</h3>
      <p class="muted" style="margin:0 0 16px;font-size:13px;">${esc(h.customer.contact||'-')} · ${esc(h.customer.email||'-')} · ID: ${esc(h.customer.id_proof||'-')}</p>
      <div class="history-stats">
        <div class="h-stat"><div class="label">Visits</div><div class="value">${h.summary.total_visits}</div></div>
        <div class="h-stat"><div class="label">Nights</div><div class="value">${h.summary.total_nights}</div></div>
        <div class="h-stat"><div class="label">Revenue</div><div class="value" style="font-size:16px;">${inr(h.summary.total_revenue)}</div></div>
        <div class="h-stat"><div class="label">Paid</div><div class="value" style="font-size:16px;color:#16a34a;">${inr(h.summary.total_paid)}</div></div>
      </div>
      ${h.summary.first_visit ? `<p class="muted" style="font-size:12px;">First visit: ${h.summary.first_visit} · Last visit: ${h.summary.last_visit}</p>` : ''}
      <h4 style="margin:18px 0 8px;">All Stays (${h.bookings.length})</h4>
      ${h.bookings.length ? `
      <table style="font-size:12px;">
        <thead><tr><th>#</th><th>Room</th><th>Stay</th><th>Nights</th><th>Guests</th><th>Status</th><th>Total</th><th>Paid</th></tr></thead>
        <tbody>${h.bookings.map(b => `
          <tr>
            <td>${b.id}</td>
            <td>${esc(b.room_number)} <small class="muted">(${esc(b.room_category)})</small></td>
            <td>${b.check_in} → ${b.check_out}</td>
            <td>${b.nights||0}</td>
            <td>${b.guests||1}${(b.guests_list && b.guests_list.length>1)?` <small class="muted">(${b.guests_list.length} listed)</small>`:''}</td>
            <td><span class="badge ${b.status}">${b.status.replace('_',' ')}</span></td>
            <td>${inr(b.total)}</td>
            <td style="color:#16a34a;">${inr(b.paid)}</td>
          </tr>`).join('')}
        </tbody>
      </table>` : '<p class="muted">No stays yet.</p>'}
      ${h.documents && h.documents.length ? `
        <h4 style="margin:18px 0 8px;">Documents on file (${h.documents.length})</h4>
        <ul style="margin:0;padding-left:20px;font-size:13px;">
          ${h.documents.map(d => `<li><strong>${esc(d.doc_type||'Doc')}</strong> · ${esc(d.original_name||'')} ${d.guest_name?` <small class="muted">— for ${esc(d.guest_name)}</small>`:''} <a href="/api/documents/${d.id}/download" style="margin-left:8px;">Download</a></li>`).join('')}
        </ul>` : ''}
    `);
  };

  function showWalkInForm({ customer, history, prefill }) {
    const c = customer || {};
    const inr = n => '₹' + Number(n||0).toLocaleString('en-IN');
    const histHtml = history && history.bookings.length ? `
      <div style="background:#eef6ff;border:1px solid #b3d9ff;padding:14px;border-radius:6px;margin:0 0 16px;">
        <strong>Returning guest!</strong> ${history.summary.total_visits} visit(s) · ${history.summary.total_nights} night(s) total · Revenue: ${inr(history.summary.total_revenue)}
        <ul style="margin:6px 0 0 18px;padding:0;font-size:13px;">
          ${history.bookings.slice(0,5).map(b => `<li>Room ${esc(b.room_number)} <small class="muted">(${esc(b.room_category)})</small> · ${b.check_in} → ${b.check_out} · ${b.nights} night(s) · ${b.status}</li>`).join('')}
        </ul>
      </div>` : '';
    const today = new Date().toISOString().slice(0,10);
    $('wi_form').innerHTML = `
      ${histHtml}
      <h3>${customer ? 'Check-In Returning Guest' : 'Register & Check-In New Guest'}</h3>
      <div class="form-grid">
        <label><span>Full Name *</span><input id="wi_name" value="${esc(c.name||(prefill||''))}" /></label>
        <label><span>Phone *</span><input id="wi_phone" value="${esc(c.contact||'')}" /></label>
        <label><span>Email</span><input id="wi_email" value="${esc(c.email||'')}" /></label>
        <label><span>ID Proof Type</span>
          <select id="wi_idtype">
            <option>Aadhar Card</option><option>PAN Card</option><option>Passport</option>
            <option>Driving License</option><option>Voter ID</option><option>Other</option>
          </select>
        </label>
        <label><span>ID Proof Number *</span><input id="wi_idnum" value="${esc(c.id_proof||'')}" placeholder="ID number" /></label>
        <label><span>Guests</span><select id="wi_guests">${[1,2,3,4,5,6].map(n=>`<option ${n===1?'selected':''}>${n}</option>`).join('')}</select></label>
        <label><span>Check-In Date *</span><input id="wi_in" type="date" min="${today}" value="${today}" /></label>
        <label><span>Check-Out Date *</span><input id="wi_out" type="date" min="${today}" /></label>
        <label class="full"><span>Room *</span>
          <select id="wi_room">
            <option value="">Select a room</option>
            ${rms.filter(r => r.status === 'available').map(r => `<option value="${r.id}" data-price="${r.price}">${esc(r.number)} – ${esc(r.category)} (₹${r.price}/night)</option>`).join('')}
          </select>
        </label>
        <div class="full"><strong>Total (auto-calculated):</strong> <span id="wi_total_disp" style="font-size:18px;color:var(--gold-2);">—</span> <small class="muted">nights × room price</small></div>
        <label class="full"><span>ID Document(s) — Aadhar/PAN front & back</span>
          <input type="file" id="wi_files" multiple accept="image/*,.pdf" />
        </label>
        <div class="full">
          <button class="primary" id="wi_submit">Complete Check-In</button>
          <span id="wi_msg" style="margin-left:12px;"></span>
        </div>
      </div>
    `;
    function recalc() {
      const opt = $('wi_room').selectedOptions[0];
      const price = opt ? parseFloat(opt.dataset.price || 0) : 0;
      const ci = new Date($('wi_in').value), co = new Date($('wi_out').value);
      if (ci && co && co > ci && price) {
        const days = Math.max(1, Math.round((co - ci) / 86400000));
        $('wi_total_disp').textContent = '₹' + (days * price).toLocaleString('en-IN') + ` (${days} night${days>1?'s':''})`;
      } else { $('wi_total_disp').textContent = '—'; }
    }
    ['wi_room','wi_in','wi_out'].forEach(id => $(id).onchange = recalc);

    $('wi_submit').onclick = async () => {
      const name = $('wi_name').value.trim(), phone = $('wi_phone').value.trim();
      const email = $('wi_email').value.trim(), room_id = $('wi_room').value;
      const idnum = $('wi_idnum').value.trim();
      const check_in = $('wi_in').value, check_out = $('wi_out').value;
      if (!name || !phone || !room_id || !check_in || !check_out) return alert('Fill name, phone, room and dates');
      if (!idnum) return alert('ID Proof Number is required');

      $('wi_submit').disabled = true;
      $('wi_msg').textContent = 'Processing...';

      // 1. Create or update customer (id_proof number is mandatory)
      let custId = c.id;
      if (!custId) {
        const fd = new FormData();
        fd.append('name', name); fd.append('contact', phone); fd.append('email', email); fd.append('id_proof', idnum);
        const cr = await fetch('/api/customers', { method: 'POST', body: fd });
        const cj = await cr.json();
        if (!cr.ok) { $('wi_msg').innerHTML = '<span style="color:#dc2626;">'+(cj.error||'Failed to add customer')+'</span>'; $('wi_submit').disabled=false; return; }
        custId = cj.id;
      } else {
        const fd = new FormData();
        fd.append('name', name); fd.append('contact', phone); fd.append('email', email); fd.append('id_proof', idnum);
        await fetch('/api/customers/' + custId, { method: 'PUT', body: fd });
      }

      // 2. Create booking — total is computed server-side
      const br = await fetch('/api/bookings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ customer_id: custId, room_id, check_in, check_out, guests: parseInt($('wi_guests').value)||1 }) });
      const bj = await br.json();
      if (!br.ok) { $('wi_msg').innerHTML = '<span style="color:#dc2626;">'+(bj.error||'Booking failed')+'</span>'; $('wi_submit').disabled=false; return; }

      // 3. Upload documents (if any) and mark checked-in
      const files = $('wi_files').files;
      if (files.length) {
        const fd = new FormData();
        fd.append('doc_type', $('wi_idtype').value);
        fd.append('guest_index', '0');
        fd.append('guest_name', name);
        for (const f of files) fd.append('documents', f);
        await fetch(`/api/bookings/${bj.id}/documents`, { method: 'POST', body: fd });
      }
      await fetch(`/api/bookings/${bj.id}/status`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status: 'checked_in' }) });

      $('wi_msg').innerHTML = '<span style="color:#16a34a;">✓ Checked in successfully (Booking #' + bj.id + ')</span>';
      setTimeout(() => walkin(), 1400);
    };
  }
}

// ---------- Visitors ----------
async function visitors() {
  const vs = await api('/api/visitors');
  const identified = vs.filter(v => v.name || v.email || v.phone);
  const anon = vs.filter(v => !v.name && !v.email && !v.phone);
  const totalVisits = vs.reduce((s,v) => s + (v.total_visits || 0), 0);
  const returning = vs.filter(v => (v.total_visits || 0) > 1).length;

  $('panel').innerHTML = `
    <h2>Live Visitor Tracking</h2>
    <p class="muted" style="margin-top:-12px;margin-bottom:18px;">Every visitor to your website is tracked. Identified guests (those who submitted a booking request) show their name/phone/email.</p>

// ---------- Modal helper ----------
function showModal(html, opts = {}) {
  const maxWidth = opts.maxWidth || 560;
  let m = document.getElementById('adminModal');
  if (!m) {
    m = document.createElement('div');
    m.id = 'adminModal';
    m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto;backdrop-filter:blur(4px);';
    m.onclick = (e) => { if (e.target === m) closeModal(); };
    document.body.appendChild(m);
  }
  m.innerHTML = `<div class="admin-modal-card" style="background:white;max-width:${maxWidth}px;width:100%;padding:30px;border-radius:8px;box-shadow:0 30px 80px rgba(0,0,0,0.35);position:relative;max-height:90vh;overflow-y:auto;animation:modal-pop 0.34s cubic-bezier(0.18, 1.25, 0.4, 1.05);">
    <button onclick="closeModal()" style="position:absolute;top:8px;right:14px;background:none;border:none;font-size:26px;cursor:pointer;color:#6b7280;line-height:1;transition:color 0.18s, transform 0.18s;" onmouseover="this.style.color='#dc2626';this.style.transform='rotate(90deg)';" onmouseout="this.style.color='#6b7280';this.style.transform='rotate(0)';">&times;</button>
    ${html}
  </div>`;
  m.style.display = 'flex';
  m.style.animation = 'overlay-fade 0.22s ease-out';
}
function closeModal() {
  const m = document.getElementById('adminModal');
  if (m) m.style.display = 'none';
}

    </div>

  $('saveSettings').onclick = async () => {
    const body = {};
    ['admin_email','smtp_host','smtp_port','smtp_user','smtp_pass','smtp_from_name'].forEach(k => body[k] = $('s_'+k).value);
    const r = await fetch('/api/content', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });

  $('saveStorage').onclick = async () => {
    const body = { document_storage_path: $('s_document_storage_path').value, default_checkin_time: $('s_default_checkin_time').value };
    await api('/api/content', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    alert('Storage settings saved!');
  };
  $('testEmail').onclick = async () => {
    $('emailMsg').textContent = 'Sending…';

    const j = await r.json();
    $('emailMsg').innerHTML = r.ok
      ? '<span style="color:#16a34a;">✓ Sent! Check your inbox.</span>'
      : `<span style="color:#dc2626;">✗ ${j.error || 'Failed'}</span>`;
  };
}

      <div class="full"><strong>Total (auto):</strong> <span id="b_total_disp" style="font-size:18px;color:var(--gold-2);">—</span> <small class="muted">nights × room price</small></div>

    <table>
      <thead><tr><th>#</th><th>Customer</th><th>Room</th><th>Stay</th><th>Guests</th><th>Total</th><th>Paid</th><th>Pending</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${bks.map(b => `
        <tr>
          <td>${b.id}</td>
          <td><strong>${esc(b.customer_name)}</strong><br><small class="muted">${esc(b.customer_contact||'')}</small></td>
          <td>${esc(b.room_number)}<br><small class="muted">${esc(b.room_category)}</small></td>
          <td>${b.check_in} <small class="muted">${ciTime}</small><br>→ ${b.check_out}</td>
          <td>${b.guests||1}${(b.guests_list && b.guests_list.length>1) ? `<br><button class="ghost" data-vg="${b.id}" style="font-size:11px;padding:3px 6px;margin-top:3px;">👥 ${b.guests_list.length} listed</button>` : ''}</td>

          <td>
            <span class="badge ${b.status}">${b.status.replace('_',' ')}</span>
            <select data-status="${b.id}" style="font-size:11px;padding:4px;margin-top:6px;display:block;">
              <option value="booked" ${b.status==='booked'?'selected':''}>Booked</option>
              <option value="checked_in" ${b.status==='checked_in'?'selected':''}>Checked In</option>
              <option value="checked_out" ${b.status==='checked_out'?'selected':''}>Checked Out</option>
              <option value="cancelled" ${b.status==='cancelled'?'selected':''}>Cancelled</option>
            </select>
          </td>
          <td>
            <button class="primary" data-pay="${b.id}" style="font-size:12px;padding:6px 8px;">💰 Payments</button>
            <button class="ok" data-checkin="${b.id}" style="font-size:12px;padding:6px 8px;margin-top:4px;display:block;">Check In / Docs</button>
            <button class="danger" data-del="${b.id}" style="font-size:11px;padding:4px 8px;margin-top:4px;display:block;">Delete</button>
          </td>
        </tr>`).join('') || '<tr><td colspan="10" class="muted" style="text-align:center;padding:30px;">No bookings yet</td></tr>'}
      </tbody>
    </table>`;

  $('b_toggleNew').onclick = () => {
    const box = $('b_newCustBox');
    const showing = box.style.display !== 'none';
    box.style.display = showing ? 'none' : 'block';
    $('b_cust').disabled = !showing;
    if (!showing) $('b_cust').value = '';
  };

  async function refreshRooms() {
    const ci = $('b_in').value, co = $('b_out').value;
    const url = ci && co ? `/api/availability?check_in=${ci}&check_out=${co}` : '/api/availability';
    const avail = await fetch(url).then(r => r.json());
    $('b_room').innerHTML = avail.length
      ? '<option value="">Select…</option>' + avail.map(r => `<option value="${r.id}" data-price="${r.price}">${esc(r.number)} – ${esc(r.category)} (₹${r.price})</option>`).join('')
      : '<option value="">No rooms available</option>';
    autoTotal();
  }
  function autoTotal() {
    const ci = new Date($('b_in').value), co = new Date($('b_out').value);
    const opt = $('b_room').selectedOptions[0];
    if (opt && opt.dataset.price && !isNaN(ci) && !isNaN(co) && co > ci) {
      const days = Math.max(1, Math.round((co - ci) / 86400000));
      $('b_total_disp').textContent = '₹' + (days * parseFloat(opt.dataset.price)).toLocaleString('en-IN') + ` (${days} night${days>1?'s':''})`;
    } else $('b_total_disp').textContent = '—';
  }
  $('b_in').onchange = refreshRooms;
  $('b_out').onchange = refreshRooms;
  $('b_room').onchange = autoTotal;
  refreshRooms();

  $('addBk').onclick = async () => {
    const usingNew = $('b_newCustBox').style.display !== 'none';
    const body = {
      room_id: $('b_room').value,
      check_in: $('b_in').value,
      check_out: $('b_out').value,
      guests: parseInt($('b_guests').value)||1
    };
    if (!body.room_id || !body.check_in || !body.check_out) return alert('Fill room and dates');
    if (usingNew) {
      const name = $('nc_name').value.trim(), contact = $('nc_contact').value.trim(), idp = $('nc_idp').value.trim();
      if (!name || !contact || !idp) return alert('Fill new customer name, phone and ID proof');
      body.customer = { name, contact, email: $('nc_email').value.trim(), id_proof: idp };
    } else {
      if (!$('b_cust').value) return alert('Select a customer or add a new one');
      body.customer_id = $('b_cust').value;
    }
    const r = await fetch('/api/bookings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const j = await r.json();
    if (r.ok) bookings();
    else $('addBkMsg').innerHTML = '<span style="color:#dc2626;">'+(j.error||'Failed')+'</span>';
  };
  document.querySelectorAll('[data-status]').forEach(s => s.onchange = async () => {
    await fetch('/api/bookings/' + s.dataset.status + '/status', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status: s.value }) });
    bookings();
  });
  document.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    if (!confirm('Delete this booking? Payments and documents linked to it will also be removed.')) return;
    await fetch('/api/bookings/' + b.dataset.del, { method: 'DELETE' });
    bookings();
  });
  document.querySelectorAll('[data-checkin]').forEach(b => b.onclick = () => openCheckInModal(bks.find(x => x.id == b.dataset.checkin)));
  document.querySelectorAll('[data-pay]').forEach(b => b.onclick = () => openPaymentsModal(bks.find(x => x.id == b.dataset.pay)));
  document.querySelectorAll('[data-vg]').forEach(b => b.onclick = () => {
    const bk = bks.find(x => x.id == b.dataset.vg);
    showGuestsModal(bk.guests_list, `Booking #${bk.id} — ${bk.customer_name}`);
  });
}

            <button class="ok" data-checkin="${b.id}" style="font-size:12px;padding:6px 8px;margin-top:4px;display:block;">Check In / Docs</button>
            <button class="danger" data-del="${b.id}" style="font-size:11px;padding:4px 8px;margin-top:4px;display:block;">Delete</button>
          </td>
        </tr>`).join('') || '<tr><td colspan="9" class="muted" style="text-align:center;padding:30px;">No bookings yet</td></tr>'}
      </tbody>
    </table>`;

  async function refreshRooms() {
    const ci = $('b_in').value, co = $('b_out').value;
    const url = ci && co ? `/api/availability?check_in=${ci}&check_out=${co}` : '/api/availability';
    const avail = await fetch(url).then(r => r.json());
    $('b_room').innerHTML = avail.length
      ? avail.map(r => `<option value="${r.id}" data-price="${r.price}">${esc(r.number)} – ${esc(r.category)} (₹${r.price})</option>`).join('')
      : '<option value="">No rooms available</option>';
    autoTotal();
  }
  function autoTotal() {
    const ci = new Date($('b_in').value), co = new Date($('b_out').value);
    const opt = $('b_room').selectedOptions[0];
    if (opt && !isNaN(ci) && !isNaN(co)) {
      const days = Math.max(1, Math.round((co - ci) / 86400000));
      $('b_total').value = days * parseFloat(opt.dataset.price || 0);
    }
  }
  $('b_in').onchange = refreshRooms;
  $('b_out').onchange = refreshRooms;
  $('b_room').onchange = autoTotal;
  refreshRooms();

  $('addBk').onclick = async () => {
    const body = { customer_id: $('b_cust').value, room_id: $('b_room').value, check_in: $('b_in').value, check_out: $('b_out').value, total: parseFloat($('b_total').value)||0 };
    if (!body.customer_id || !body.room_id || !body.check_in || !body.check_out) return alert('Fill all fields');
    const r = await fetch('/api/bookings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (r.ok) bookings(); else alert('Failed');
  };
  document.querySelectorAll('[data-status]').forEach(s => s.onchange = async () => {
    await fetch('/api/bookings/' + s.dataset.status + '/status', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status: s.value }) });
    bookings();
  });
  document.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    if (!confirm('Delete this booking?')) return;
    await fetch('/api/bookings/' + b.dataset.del, { method: 'DELETE' });
    bookings();
  });
  document.querySelectorAll('[data-checkin]').forEach(b => b.onclick = () => openCheckInModal(bks.find(x => x.id == b.dataset.checkin)));
  document.querySelectorAll('[data-pay]').forEach(b => b.onclick = () => openPaymentsModal(bks.find(x => x.id == b.dataset.pay)));
}

// ---------- Check-In / Document upload modal (per-guest, multi-upload) ----------
async function openCheckInModal(bk) {
  const docs = await api(`/api/bookings/${bk.id}/documents`);
  // Build the guest list — primary customer first, plus extra guests_list (skip the primary if duplicated)
  const guests = [{ name: bk.customer_name, primary: true }];
  if (bk.guests_list && bk.guests_list.length) {
    bk.guests_list.forEach((g, i) => {
      if (i === 0 && g.name === bk.customer_name) return; // dedupe primary
      guests.push(g);
    });
  }
  // Pad to match the booking's `guests` count if guests_list is shorter
  const want = parseInt(bk.guests) || guests.length;
  while (guests.length < want) guests.push({ name: 'Guest ' + (guests.length + 1) });

  // Group existing docs by guest_index for the "already uploaded" badge
  const docsByGuest = {};
  docs.forEach(d => {
    const k = d.guest_index ?? 0;
    (docsByGuest[k] = docsByGuest[k] || []).push(d);
  });

  const idTypes = ['Aadhar Card','PAN Card','Passport','Driving License','Voter ID','Other ID Proof'];
  const guestCardsHtml = guests.map((g, i) => {
    const gName = g.name || ('Guest ' + (i + 1));
    const existing = docsByGuest[i] || [];
    return `
      <div class="ci-guest-card ${existing.length?'is-uploaded':''}" data-guest-card="${i}">
        <div class="ci-guest-head">
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <span class="ci-guest-num">${i===0?'★ Primary':'Guest '+(i+1)}</span>
            <span class="ci-guest-name">${esc(gName)}</span>
          </div>
          ${existing.length ? `<span class="ci-guest-existing">✓ ${existing.length} doc(s) on file</span>` : ''}
        </div>
        <div class="ci-guest-fields">
          <label><span>Document Type</span>
            <select class="ci-type">
              ${idTypes.map(t => `<option ${i===0&&t==='Aadhar Card'?'selected':''}>${t}</option>`).join('')}
            </select>
          </label>
          <label><span>Upload File(s) — front & back, image or PDF (max 10MB each)</span>
            <input type="file" class="ci-files" multiple accept="image/*,.pdf" />
          </label>
        </div>
        <div class="ci-guest-status" data-status></div>
      </div>`;
  }).join('');

  const existingDocsBlock = docs.length ? `
    <div style="margin-top:18px;padding-top:14px;border-top:1px dashed #e5e7eb;">
      <strong style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#6b7280;">All Documents on File (${docs.length})</strong>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px;">
        ${docs.map(d => `
          <div style="display:flex;justify-content:space-between;padding:8px 10px;border:1px solid #eee;border-radius:4px;align-items:center;font-size:13px;background:#fafafa;">
            <span><strong>${esc(d.doc_type||'Doc')}</strong> · ${esc(d.original_name||'')}
              ${d.guest_name ? ` <small style="color:var(--gold-2);">— for ${esc(d.guest_name)}</small>` : ''}
              <br><small class="muted">${(d.uploaded_at||'').slice(0,16).replace('T',' ')}</small></span>
            <span style="white-space:nowrap;"><a href="/api/documents/${d.id}/download" class="ghost" style="text-decoration:none;padding:6px 10px;">Download</a>
            <button class="danger" data-deldoc="${d.id}" style="margin-left:6px;">×</button></span>
          </div>`).join('')}
      </div>
    </div>` : '';

  showModal(`
    <h3 style="margin:0 0 6px;">Check-In · Booking #${bk.id}</h3>
    <p class="muted" style="margin:0 0 18px;">${esc(bk.customer_name)} · Room ${esc(bk.room_number)} (${esc(bk.room_category)}) · ${bk.check_in} → ${bk.check_out} · <strong>${bk.guests||1} guest(s)</strong></p>
    <p style="margin:0 0 14px;font-size:13px;color:#374151;background:#fff8e6;border-left:3px solid var(--gold);padding:10px 12px;border-radius:4px;">
      📎 Upload an ID document for <strong>each guest</strong>. You can leave guests blank and upload later — only filled guest cards will be sent.
    </p>
    <div id="ci_guests_wrap">${guestCardsHtml}</div>

    <div style="display:flex;gap:10px;align-items:center;margin-top:16px;flex-wrap:wrap;">
      <button class="primary" id="ci_upload">Upload All &amp; Mark Checked-In</button>
      <button class="ghost" id="ci_uploadOnly">Upload Only</button>
      <span id="ci_msg" style="margin-left:8px;"></span>
    </div>

    ${existingDocsBlock}
  `, { maxWidth: 720 });

  document.querySelectorAll('[data-deldoc]').forEach(b => b.onclick = async () => {
    if (!confirm('Delete this document?')) return;
    await fetch('/api/documents/' + b.dataset.deldoc, { method: 'DELETE' });
    openCheckInModal(bk);
  });

  async function doUpload(markCheckedIn) {
    const cards = Array.from(document.querySelectorAll('[data-guest-card]'));
    const cardsWithFiles = cards.filter(c => c.querySelector('.ci-files').files.length > 0);

    if (!cardsWithFiles.length && !markCheckedIn) {
      $('ci_msg').innerHTML = '<span style="color:#dc2626;">Choose at least one file to upload.</span>';
      return;
    }

    let okCount = 0, failCount = 0;
    for (const card of cardsWithFiles) {
      const idx = parseInt(card.dataset.guestCard);
      const files = card.querySelector('.ci-files').files;
      const docType = card.querySelector('.ci-type').value;
      const guestName = card.querySelector('.ci-guest-name').textContent.trim();
      const status = card.querySelector('[data-status]');
      status.className = 'ci-guest-status busy';
      status.textContent = `Uploading ${files.length} file(s)…`;

      const fd = new FormData();
      fd.append('doc_type', docType);
      fd.append('guest_index', String(idx));
      fd.append('guest_name', guestName);
      for (const f of files) fd.append('documents', f);

      try {
        const r = await fetch(`/api/bookings/${bk.id}/documents`, { method: 'POST', body: fd });
        if (!r.ok) throw new Error('Upload failed');
        status.className = 'ci-guest-status ok';
        status.textContent = `✓ ${files.length} file(s) uploaded`;
        card.classList.add('is-uploaded');
        okCount++;
      } catch (e) {
        status.className = 'ci-guest-status err';
        status.textContent = '✗ Upload failed — try again';
        failCount++;
      }
    }

    if (markCheckedIn && failCount === 0) {
      await fetch(`/api/bookings/${bk.id}/status`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status: 'checked_in' }) });
    }

    if (failCount > 0) {
      $('ci_msg').innerHTML = `<span style="color:#dc2626;">${failCount} guest upload(s) failed. ${okCount} succeeded.</span>`;
    } else {
      $('ci_msg').innerHTML = `<span style="color:#16a34a;">✓ ${markCheckedIn ? 'Checked in.' : 'Uploaded.'} ${okCount?okCount+' guest(s) saved.':''}</span>`;
      setTimeout(() => { closeModal(); bookings(); }, 900);
    }
  }
  $('ci_upload').onclick = () => doUpload(true);
  $('ci_uploadOnly').onclick = () => doUpload(false);
}

      </tr>`).join('') || '<tr><td colspan="7" class="muted" style="text-align:center;padding:30px;">No payments in this period</td></tr>'}</tbody>
    </table>`;

  document.querySelectorAll('[data-p]').forEach(b => b.onclick = () => { currentPeriod = b.dataset.p; reports(); });
  $('rep_custom').onclick = () => {
    const s = $('rep_start').value, e = $('rep_end').value;
    if (!s || !e) return alert('Pick both dates');
    customStart = s; customEnd = e; currentPeriod = 'custom'; reports();
  };
}

function esc(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

// boot
fetch('/api/me').then(r => r.json()).then(d => d.admin ? renderApp() : renderLogin());
</script>
</body>
</html>
